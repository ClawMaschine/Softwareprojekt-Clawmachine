server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Captive Portal Trigger ────────────────────────────────────────────────
    #
    # Geräte testen beim WLAN-Beitritt bekannte URLs und erwarten spezifische Antworten.
    # Weicht die Antwort ab, zeigen sie den "Anmelden"-Dialog.
    #
    # Nintendo Switch / Switch 2:
    #   GET http://conntest.nintendowifi.net/ → erwartet HTTP 200 + Body "TEST"
    #   Abweichende Antwort → zeigt Captive-Portal-Dialog
    location = /hotspot-detect.html {
        # iOS / macOS: captive.apple.com/hotspot-detect.html
        return 302 http://192.168.0.103/;
    }

    location = /generate_204 {
        # Android: connectivitycheck.gstatic.com/generate_204 → erwartet 204
        return 302 http://192.168.0.103/;
    }

    location = /connecttest.txt {
        # Windows: www.msftconnecttest.com/connecttest.txt
        return 302 http://192.168.0.103/;
    }

    # Alle übrigen Anfragen mit fremdem Host-Header → Redirect auf unser Frontend
    # (fängt u.a. conntest.nintendowifi.net und alles andere ab)
    if ($host != "192.168.0.103") {
        return 302 http://192.168.0.103/;
    }

    # ── Frontend ausliefern ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
