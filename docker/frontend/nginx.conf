server {
    listen 80 default_server;

    # Alle Anfragen annehmen, unabhängig vom Host-Header.
    # Captive Portal: Gerät fragt beliebige URL → bekommt immer das Frontend.
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Angular-Routing: unbekannte Pfade auf index.html umleiten
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Kein Caching für index.html (Angular-Updates sofort wirksam)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
