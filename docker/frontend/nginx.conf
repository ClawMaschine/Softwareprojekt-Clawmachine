server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Captive Portal Trigger:
    # Geräte fragen beim WLAN-Beitritt bekannte URLs ab (z.B. captive.apple.com,
    # connectivitycheck.gstatic.com). Der Host-Header ist dann NICHT unsere IP.
    # → 302-Redirect auf unsere IP löst die "Anmelden"-Meldung auf dem Endgerät aus.
    if ($host != "192.168.0.103") {
        return 302 http://192.168.0.103/;
    }

    # Anfragen direkt an 192.168.0.103 → Angular-Frontend ausliefern
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
