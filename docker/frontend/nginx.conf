# ── Frontend ──────────────────────────────────────────────────────────────────
# Erreichbar unter 192.168.0.103 (Hotspot) und localhost (Entwicklung)
server {
    listen 80;
    server_name 192.168.0.103 localhost 127.0.0.1;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# ── Captive Portal Trigger ────────────────────────────────────────────────────
# Alle anderen Host-Header (conntest.nintendowifi.net, captive.apple.com, …)
# bekommen einen 302 → Endgeräte zeigen den "Anmelden"-Dialog.
server {
    listen 80 default_server;
    server_name _;

    return 302 http://192.168.0.103/;
}
