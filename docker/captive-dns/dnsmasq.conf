# Alle DNS-Anfragen auf die Hotspot-IP umleiten → Endgeräte landen im Frontend
address=/#/192.168.0.103

# Loopback ausschließen
except-interface=lo

# bind-dynamic: bindet dynamisch wenn Interfaces hochkommen (robust bei Boot-Reihenfolge)
bind-dynamic

# Keine /etc/resolv.conf des Hosts verwenden
no-resolv

# Kein DHCP (läuft auf dem Host via dnsmasq-Systemdienst)
no-dhcp-interface=
