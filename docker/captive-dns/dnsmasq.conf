# Alle DNS-Anfragen auf die Hotspot-IP umleiten → Browser landet im Frontend
address=/#/192.168.0.103

# Nur auf dem Hotspot-Interface lauschen
listen-address=192.168.0.103

# Loopback ausschließen
except-interface=lo

# Kein DHCP (wird von dnsmasq auf dem Host gemacht)
no-dhcp-interface=

# Keine /etc/resolv.conf des Hosts verwenden
no-resolv
