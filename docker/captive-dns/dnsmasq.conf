# Alle DNS-Anfragen auf die Hotspot-IP umleiten → Endgeräte landen im Frontend
address=/#/192.168.0.103

# Nur auf dem Hotspot-Interface lauschen (nicht eth0, virbr0 oder andere)
listen-address=192.168.0.103
bind-interfaces

# Loopback ausschließen
except-interface=lo

# Keine /etc/resolv.conf des Hosts verwenden
no-resolv

# Kein DHCP (läuft auf dem Host via dnsmasq-Systemdienst)
no-dhcp-interface=

# Erlaube private IPs (192.168.x.x) als Antwort für öffentliche Domains.
# Ohne diese Einstellung lehnt dnsmasq solche Antworten als "DNS-Rebinding" ab.
rebind-domain-ok=/#
