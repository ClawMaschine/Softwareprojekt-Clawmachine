services:

  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt-broker
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log

  # DNS: leitet alle Anfragen auf 192.168.0.103 um → Clients landen im Frontend
  captive-dns:
    build:
      context: ./captive-dns
      dockerfile: Dockerfile
    container_name: captive-dns
    restart: unless-stopped
    # host-Netzwerk: bindet direkt ans Hotspot-Interface (wlo1 / 192.168.0.103:53)
    # Kein Port-Mapping nötig — dnsmasq hat port=0, kein Konflikt
    network_mode: host
    environment:
      - DNS_REDIRECT_IP=192.168.0.103

  # Frontend: Angular-App, erreichbar unter http://192.168.0.103
  frontend:
    build:
      context: ..          # Repo-Root (docker-compose liegt in docker/)
      dockerfile: docker/frontend/Dockerfile
    container_name: clawmachine-frontend
    restart: unless-stopped
    ports:
      - "192.168.0.103:80:80"
