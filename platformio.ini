lib_deps = 
	knolleary/PubSubClient@^2.8
	adafruit/Adafruit Motor Shield V2 Library@^1.1.4
	arduino-libraries/Servo@^1.3.0
build_flags = -DCLAW_MOTOR_CONTROLLER_CLIENT_ID=\"claw_1\"

