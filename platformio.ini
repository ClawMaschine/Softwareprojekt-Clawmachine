; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = esp32dev
framework = arduino

[env:claw_motor_controller]
build_src_filter = +<../src_claw_motor_controller/*> -<*>
lib_deps = 
	bblanchon/ArduinoJson@^7.2.2
	knolleary/PubSubClient@^2.8
	adafruit/Adafruit Motor Shield V2 Library@^1.1.4
	arduino-libraries/Servo@^1.3.0
monitor_speed = 115200
upload_speed = 921600
build_flags = -DCLAW_MOTOR_CONTROLLER_CLIENT_ID=\"claw_motor_controller\"

[env:claw_player_input]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
framework = espidf
monitor_speed = 115200
upload_speed = 115200
upload_resetmethod = nodemcu
board_build.esp-idf.sdkconfig_path = sdkconfig.defaults
board_build.partitions = partitions_singleapp_large_coredump.csv
board_build.embed_txtfiles = 
	managed_components/espressif__esp_insights/server_certs/https_server.crt
	managed_components/espressif__esp_insights/server_certs/mqtt_server.crt
	managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
	managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
	managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt
lib_deps = 
	knolleary/PubSubClient@^2.8
	adafruit/Adafruit Motor Shield V2 Library@^1.1.4
	arduino-libraries/Servo@^1.3.0
	bblanchon/ArduinoJson@7.4.3
build_flags = -DCLAW_PLAYER_INPUT_CLIENT_ID=\"claw_player_input\"

[env:claw_1]
build_src_filter = +<../src_claw_1/*> -<*>
monitor_speed = 115200
