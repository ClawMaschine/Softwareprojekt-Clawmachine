; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	knolleary/PubSubClient@^2.8

[env:claw_motor_controller]
build_src_filter = +<../src_claw_motor_controller/*> -<*>
lib_deps = bblanchon/ArduinoJson@^7.2.2
monitor_speed = 115200
upload_speed = 921600
build_flags = -DCLAW_MOTOR_CONTROLLER_CLIENT_ID=\"claw_1\"

[env:claw_3]
build_src_filter = +<../src_claw_3/*> -<*>
monitor_speed = 115200
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.2
upload_speed = 921600
build_flags = -DCLAW_MOTOR_CONTROLLER_CLIENT_ID=\"claw_3\"

[env:claw_server]
build_src_filter = +<../src_claw_server/*> -<*>
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.2
build_flags = -DCLAW_CONTROL_PANEL_CLIENT_ID=\"control_panel\"

[env:claw_player_input]
; Eigene Platform statt der globalen [env]-Platform, weil die offizielle espressif32-Platform
; ESP-IDF + Arduino als gleichzeitige Komponente nicht unterstützt. pioarduino ist ein Fork
; der das kann – nötig damit Bluepad32 (ESP-IDF-Komponente) und Arduino-Code zusammen laufen.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip

; ESP-IDF statt Arduino, weil Bluepad32 eine ESP-IDF-Komponente ist (in components/).
; Arduino-Framework bindet components/ nicht ein – deshalb muss framework = espidf gesetzt sein.
; Quellcode-Auswahl läuft über src/CMakeLists.txt (nicht über build_src_filter wie bei den anderen Envs).
framework = espidf

; Baudrate des Serial Monitors – muss mit CONFIG_ESP_CONSOLE_UART_BAUDRATE in sdkconfig übereinstimmen.
monitor_speed = 115200

; CH340-Chip auf diesem Board friert unter Linux ein wenn esptool DTR und RTS getrennt pulsiert.
; nodemcu kombiniert beide Signale gleichzeitig – das umgeht den Kernel-Bug.
; upload_speed kann damit normal hoch sein – der Freeze kam vom Reset, nicht von der Geschwindigkeit.
upload_speed = 115200
upload_resetmethod = nodemcu

; Welche sdkconfig-Datei der ESP-IDF-Build als Basis nutzt.
; Enthält: BT Classic aktiviert, WiFi-IRAM-Opts deaktiviert
; FreeRTOS + Ringbuf in Flash verschoben, Partition Table auf SINGLE_APP_LARGE.
board_build.esp-idf.sdkconfig_path = sdkconfig.defaults

; PlatformIO generiert partitions.bin über sein eigenes Script (espidf.py) – unabhängig vom
; ESP-IDF CMake-Build. Ohne diesen Eintrag nimmt espidf.py den Default partitions_singleapp.csv
; (1 MB Factory-Partition) – die Firmware ist 1,37 MB → Boot-Loop. 
; partitions_singleapp_large_coredump.csv gibt 1500 KB Factory + 64 KB Coredump.
board_build.partitions = partitions_singleapp_large_coredump.csv

; Bluepad32 zieht esp_insights und esp_rainmaker als transitive Abhängigkeiten mit.
; Diese Komponenten betten TLS-Zertifikate via target_add_binary_data() ein.
; Für jeden solchen Eintrag muss pioarduino eine .S-Assembly-Datei generieren – sonst
; schlägt der Linker mit "Source '*.crt.S' not found" fehl. (Siehe F03)
board_build.embed_txtfiles =
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_insights/server_certs/mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt

; MQTT-Library für die Verbindung zum Mosquitto-Broker auf dem Raspberry Pi.
lib_deps =
    knolleary/PubSubClient@^2.8

; Compile-time Konstante für die MQTT Client-ID – wird in ClawMqttConnection verwendet.
build_flags = -DCLAW_PLAYER_INPUT_CLIENT_ID=\"claw_player_input\"


[env:claw_2]
build_src_filter = +<../src_claw_2/*> -<*>
monitor_speed = 115200
upload_speed = 115200

[env:claw_server_ota]
extends = env:claw_server
upload_protocol = espota
upload_port = 192.168.4.1
monitor_speed = 115200
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.2
