; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = denky32
framework = arduino
lib_deps = 
	knolleary/PubSubClient@^2.8

[env:claw_1]
build_src_filter = +<../src_claw_1/*> -<*>
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.2
monitor_speed = 115200
upload_speed = 921600
build_flags = -DCLAW_MOTOR_CONTROLLER_CLIENT_ID=\"claw_1\"

[env:claw_3]
build_src_filter = +<../src_claw_3/*> -<*>
monitor_speed = 115200
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.2
upload_speed = 921600
build_flags = -DCLAW_MOTOR_CONTROLLER_CLIENT_ID=\"claw_3\"

[env:claw_server]
build_src_filter = +<../src_claw_server/*> -<*>
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.2
build_flags = -DCLAW_CONTROL_PANEL_CLIENT_ID=\"control_panel\"

[env:claw_2]
build_src_filter = +<../src_claw_2/*> -<*>
monitor_speed = 115200
upload_speed = 115200

[env:claw_server_ota]
extends = env:claw_server
upload_protocol = espota
upload_port = 192.168.4.1
monitor_speed = 115200
lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.2
