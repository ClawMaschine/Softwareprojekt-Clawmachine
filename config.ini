# Gemeinsame Projektkonfiguration — Clawmachine
#
# Diese Datei ist die zentrale Konfiguration für Server und ESP-Firmware.
# Sie ist in git eingecheckt und enthält die Standardwerte für den Server-Betrieb
# (MQTT-Broker läuft lokal auf demselben Rechner).
#
# Für lokale Entwicklung (Broker auf einem anderen Rechner):
#   cp config.local.ini.example config.local.ini
#   config.local.ini anpassen — wird von git ignoriert und überschreibt diese Datei.
#
# Nach Änderungen hier: ESP-Firmware-Konfiguration neu generieren:
#   python scripts/dev/generate_firmware_config.py

[mqtt]
# Geteilte Werte — werden auch in include/firmware_config.h verwendet (via generate_firmware_config.py)
broker = 192.168.0.103
port = 1883
username = clawmachine
password = clawmachine_secret

# Nur Server (Python-Server)
topic = clawmachine/claw
device_added_topic = clawmachine/device/added
client_id = server
connect_timeout_seconds = 5

[wifi]
# ESP-Firmware — WiFi-Zugangsdaten für das Praktikumsnetzwerk
# Diese Werte werden in include/firmware_config.h eingetragen (via generate_firmware_config.py)
ssid = clawmachine_server
password = claw_secret

[hotspot]
# Raspberry Pi Access Point — wird von scripts/setup/setup_hotspot.py verwendet
# SSID und Passwort kommen aus [wifi] (selbes Netz, das die ESP32-Boards erwarten)
ip = 192.168.0.103
prefix = 24
dhcp_start = 192.168.0.100
dhcp_end = 192.168.0.200
dhcp_lease = 12h
channel = 6
